{{- if .Values.webhook.enable }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    {{- if .Values.certManager.enable }}
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "shopify-operator.resourceName" (dict "suffix" "serving-cert" "context" $) }}
    {{- end }}
  name: {{ include "shopify-operator.resourceName" (dict "suffix" "validating-webhook-configuration" "context" $) }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "shopify-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-lukemcewen-com-v1-shopifyscraper
  failurePolicy: Fail
  name: vshopifyscraper-v1.kb.io
  rules:
  - apiGroups:
    - lukemcewen.com
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - shopifyscrapers
  sideEffects: None
{{- end }}
