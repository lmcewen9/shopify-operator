apiVersion: v1
kind: Pod
metadata:
  labels:
    app: shopify-operator-pod
  name: {{ include "shopify-operator.resourceName" (dict "suffix" "pod" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  containers:
  - command:
    - sleep
    - infinity
    image: alpine:3.21
    imagePullPolicy: IfNotPresent
    name: shopify-operator-pod
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
    volumeMounts:
    - mountPath: /shopify
      name: shopify-storage
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  volumes:
  - name: shopify-storage
    persistentVolumeClaim:
      claimName: {{ include "shopify-operator.resourceName" (dict "suffix" "pvc" "context" $) }}
