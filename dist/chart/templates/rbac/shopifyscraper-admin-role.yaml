{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "shopify-operator.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "shopify-operator.resourceName" (dict "suffix" "shopifyscraper-admin-role" "context" $) }}
rules:
- apiGroups:
  - lukemcewen.com
  resources:
  - shopifyscrapers
  verbs:
  - '*'
- apiGroups:
  - lukemcewen.com
  resources:
  - shopifyscrapers/status
  verbs:
  - get
{{- end }}
